name: Deploy Anna Site to dev

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Clone anna source
        run: git clone --depth=1 https://github.com/anna-ssg/anna.git /tmp/anna

      - name: Add gm-alert-callouts and patch parser.go
        run: |
          cd /tmp/anna
          go get github.com/zmtcreative/gm-alert-callouts@latest
          cd ${{ github.workspace }}
          python3 ci/patch_anna.py /tmp/anna

      - name: Build patched anna binary
        working-directory: /tmp/anna
        run: |
          go mod tidy
          go build -o /usr/local/bin/anna .

      - name: Build Site
        run: anna

      - name: Prepare dev directory for Pages
        run: |
          mkdir -p public
          cp -r site/rendered/* public/
          REPO_NAME="${{ github.event.repository.name }}"
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|href=\"/|href=\"/$REPO_NAME/|g" {} +
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|src=\"/|src=\"/$REPO_NAME/|g" {} +
          find public -type f \( -name "*.html" -o -name "*.css" -o -name "*.xml" -o -name "*.js" \) -exec sed -i "s|url(/|url(/$REPO_NAME/|g" {} +
          find public -type f -name "*.html" -exec sed -i "s|fetch('/|fetch('/$REPO_NAME/|g" {} +
          find public -type f -name "*.html" -exec sed -i "s|a.href = '/|a.href = '/$REPO_NAME/|g" {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
